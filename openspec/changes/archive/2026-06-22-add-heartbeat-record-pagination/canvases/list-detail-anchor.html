<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>List Detail Anchor Canvas</title>
    <link rel="stylesheet" href="record-color-tokens.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="record-components.js"></script>
    <style>
      :root {
        --bg: var(--tone-canvas, #f5f6f8);
        --paper: var(--tone-surface, #fff);
        --ink: var(--tone-ink, #111827);
        --muted: var(--tone-muted, #667085);
        --line: var(--tone-border, #d9e1ea);
        --blue: var(--tone-accent, #2563eb);
        --shadow: 0 18px 46px rgba(15, 23, 42, 0.12);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at 12% 0%, rgba(37, 99, 235, 0.08), transparent 30%),
          radial-gradient(circle at 100% 12%, rgba(14, 159, 110, 0.06), transparent 28%), var(--bg);
        color: var(--ink);
        overflow-x: clip;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      button {
        font: inherit;
      }

      .icon-svg {
        inline-size: 15px;
        block-size: 15px;
        flex: 0 0 auto;
      }

      .page {
        display: grid;
        gap: 14px;
        min-height: 100vh;
        min-width: 0;
        padding: 16px;
      }

      .hero,
      .anchor-bar,
      .panel {
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: var(--shadow);
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: end;
        min-width: 0;
        padding: 16px;
      }

      .hero h1 {
        font-size: 18px;
        line-height: 1.18;
      }

      .hero p,
      .small,
      .section-meta,
      .rail-label {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
        min-width: 0;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .pill-row,
      .anchor-actions,
      .status {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        min-width: 0;
      }

      .pill,
      .anchor-actions button,
      .status-chip,
      .tab {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
        max-inline-size: 100%;
        min-height: 28px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #fbfcfe;
        padding: 0 10px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 720;
        white-space: nowrap;
      }

      .anchor-bar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        min-width: 0;
        padding: 12px 14px;
      }

      .anchor-actions button {
        cursor: pointer;
      }

      .anchor-actions button[aria-selected="true"] {
        border-color: color-mix(in oklab, var(--blue), white 34%);
        background: color-mix(in oklab, var(--blue), white 92%);
        color: color-mix(in oklab, var(--blue), black 15%);
      }

      .workbench {
        display: grid;
        grid-template-columns: minmax(300px, 0.92fr) minmax(420px, 1.28fr);
        gap: 14px;
        min-width: 0;
      }

      .panel {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-width: 0;
        overflow: hidden;
        padding: 14px;
      }

      .panel-head {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        align-items: start;
        min-width: 0;
      }

      .panel-head h2 {
        font-size: 13px;
      }

      .record-stack {
        display: grid;
        gap: 10px;
        align-content: start;
        overflow: auto;
        padding-right: 2px;
      }

      .record-item {
        display: block;
        width: 100%;
        padding: 0;
        border: 0;
        background: none;
        text-align: left;
        border-radius: 18px;
        cursor: pointer;
      }

      .record-item:focus-visible {
        outline: none;
        box-shadow: 0 0 0 3px color-mix(in oklab, var(--blue), transparent 86%);
      }

      .record-item[aria-selected="true"] {
        box-shadow: 0 0 0 3px color-mix(in oklab, var(--blue), transparent 86%);
      }

      .record-item x-model-run-card,
      .record-item x-basic-record-card {
        display: block;
        width: 100%;
      }

      x-record-detail-surface {
        display: block;
        min-width: 0;
        min-height: 0;
      }

      @media (max-width: 980px) {
        .workbench {
          grid-template-columns: 1fr;
        }

        .panel {
          min-height: 320px;
        }
      }

      @media (max-width: 620px) {
        .page {
          padding: 10px;
          gap: 12px;
        }

        .hero,
        .anchor-bar {
          grid-template-columns: 1fr;
        }

        .panel-head {
          grid-template-columns: 1fr;
        }

        .pill-row {
          justify-content: flex-start;
        }

        .panel {
          padding: 10px;
        }

        .hero {
          gap: 8px;
          padding: 12px;
        }

        .anchor-bar {
          padding: 10px 12px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div>
          <h1>List + Detail</h1>
        </div>
        <div class="pill-row" aria-label="Canvas laws">
          <span class="pill"><i data-lucide="list" class="icon-svg" aria-hidden="true"></i>rows</span>
          <span class="pill"><i data-lucide="combine" class="icon-svg" aria-hidden="true"></i>cards</span>
          <span class="pill"><i data-lucide="panel-right" class="icon-svg" aria-hidden="true"></i>detail rail</span>
        </div>
      </section>

      <section class="anchor-bar" aria-label="Pagination anchor controls">
        <div>
          <strong id="anchorTitle">Latest anchor</strong>
          <div id="anchorText" class="small">live</div>
        </div>
        <div class="anchor-actions">
          <button type="button" data-anchor="latest" aria-selected="true">Latest</button>
          <button type="button" data-anchor="fixed" aria-selected="false">Fixed page 16</button>
          <button type="button" data-anchor="new" aria-selected="false">3 new records</button>
        </div>
      </section>

      <section class="workbench">
        <section class="panel" aria-label="Record list">
          <div class="panel-head">
            <div>
              <h2>Shared Record Cards</h2>
            </div>
            <span class="pill"><i data-lucide="rows-3" class="icon-svg" aria-hidden="true"></i>bounded rows</span>
          </div>

          <div class="record-stack">
            <button type="button" class="record-item" data-record="model" aria-selected="true">
              <x-model-run-card sample="tool-loop" open-latest></x-model-run-card>
            </button>

            <button type="button" class="record-item" data-record="compact" aria-selected="false">
              <x-basic-record-card data-card-kind="compact">
                <template shadowrootmode="open">
                  <link rel="stylesheet" href="basic-record-card.css" />
                  <article class="card">
                    <header class="head">
                      <div class="stack"><slot name="time"></slot><slot name="duration"></slot></div>
                      <div class="stack"><slot name="title"></slot><slot name="meta"></slot></div>
                      <div class="status-wrap"><slot name="status"></slot></div>
                    </header>
                    <div class="body"><slot name="body"></slot></div>
                    <footer class="support"><slot name="support"></slot></footer>
                  </article>
                </template>
                <span slot="time">14:23</span>
                <span slot="duration">2.8s</span>
                <span slot="title">Compact</span>
                <span slot="meta">new context focused</span>
                <span slot="status">running</span>
                <x-compact-body slot="body" before="71.2" after="38.6" state="running"></x-compact-body>
                <span slot="support">New Context</span>
              </x-basic-record-card>
            </button>

            <button type="button" class="record-item" data-record="config" aria-selected="false">
              <x-basic-record-card data-card-kind="config">
                <template shadowrootmode="open">
                  <link rel="stylesheet" href="basic-record-card.css" />
                  <article class="card">
                    <header class="head">
                      <div class="stack"><slot name="time"></slot><slot name="duration"></slot></div>
                      <div class="stack"><slot name="title"></slot><slot name="meta"></slot></div>
                      <div class="status-wrap"><slot name="status"></slot></div>
                    </header>
                    <div class="body"><slot name="body"></slot></div>
                    <footer class="support"><slot name="support"></slot></footer>
                  </article>
                </template>
                <span slot="time">14:21</span>
                <span slot="duration">next call</span>
                <span slot="title">Config</span>
                <span slot="meta">changed controls only</span>
                <span slot="status">applied</span>
                <x-config-body
                  slot="body"
                  provider="openai · gpt-5.1"
                  scope="avatar settings"
                  state="applied"
                  temperature="0.4"
                  topk="32"
                  maxtoken="8192"
                  thinking="on"
                  thinking-budget="2048"
                ></x-config-body>
                <span slot="support">Diff Config</span>
              </x-basic-record-card>
            </button>

            <button type="button" class="record-item" data-record="error" aria-selected="false">
              <x-model-run-card sample="error"></x-model-run-card>
            </button>
          </div>
        </section>

        <section class="panel" aria-label="Selected detail">
          <div class="panel-head">
            <div>
              <h2>Chips-Line Detail</h2>
            </div>
            <span class="pill"><i data-lucide="panel-right" class="icon-svg" aria-hidden="true"></i>detail</span>
          </div>

          <x-record-detail-surface id="detail" record="model" anchor="latest">
            <template shadowrootmode="open">
              <style>
                :host {
                  --surface: #fff;
                  --subtle: #667085;
                  --border: #d9e1ea;
                  --accent: #2563eb;
                  display: block;
                  color: #111827;
                }

                * {
                  box-sizing: border-box;
                }

                .detail {
                  display: grid;
                  grid-template-rows: auto minmax(0, 1fr);
                  min-height: 100%;
                  background: var(--surface);
                }

                .detail-head {
                  display: grid;
                  grid-template-columns: minmax(0, 1fr) auto;
                  gap: 10px;
                  align-items: start;
                  border-bottom: 1px solid var(--border);
                  background: #f8fafc;
                  padding: 14px;
                }

                .title {
                  display: grid;
                  gap: 4px;
                  min-width: 0;
                }

                .title strong {
                  overflow: hidden;
                  font-size: 14px;
                  line-height: 1.18;
                  text-overflow: ellipsis;
                  white-space: nowrap;
                }

                .summary {
                  color: var(--subtle);
                  font-size: 12px;
                  line-height: 1.45;
                }

                .summary:empty {
                  display: none;
                }

                .status {
                  display: flex;
                  flex-wrap: wrap;
                  justify-content: flex-end;
                  gap: 8px;
                }

                .status-chip {
                  display: inline-flex;
                  align-items: center;
                  gap: 6px;
                  min-height: 28px;
                  border: 1px solid var(--border);
                  border-radius: 999px;
                  background: #fbfcfe;
                  padding: 0 10px;
                  color: var(--subtle);
                  font-size: 11px;
                  font-weight: 720;
                  white-space: nowrap;
                }

                .status-chip .icon-svg {
                  inline-size: 13px;
                  block-size: 13px;
                }

                .detail-body {
                  overflow: auto;
                  padding: 14px;
                }

                .detail-grid {
                  display: grid;
                  grid-template-columns: 238px minmax(0, 1fr);
                  gap: 20px;
                  align-items: start;
                }

                .detail-track {
                  --rail-gap-col: 6px;
                  --chip-axis-x: 14px;
                  display: grid;
                  grid-template-columns:
                    max-content 4px 1px var(--rail-gap-col) minmax(min-content, max-content)
                    minmax(0, 1fr);
                  column-gap: 0;
                  align-items: stretch;
                  min-width: 0;
                }

                .time-bridge {
                  --rail-from: var(--accent);
                  --rail-to: var(--accent);
                  --bridge-gap: 1px;
                  grid-column: 3;
                  position: relative;
                  z-index: 0;
                  min-block-size: 1px;
                  padding-block-end: var(--bridge-gap);
                  overflow: visible;
                  pointer-events: none;
                }

                .time-bridge-label {
                  --rail-from: var(--accent);
                  grid-column: 1;
                  align-self: center;
                  justify-self: end;
                  max-inline-size: 54px;
                  font-size: 9px;
                  font-weight: 800;
                  line-height: 1;
                  overflow: hidden;
                  pointer-events: none;
                  text-overflow: ellipsis;
                  white-space: nowrap;
                  background: linear-gradient(to bottom, var(--rail-from), var(--rail-to));
                  aspect-ratio: 1;
                  margin-inline-end: calc(-50% - 2px);
                  border-radius: 38%;
                  display: flex;
                  justify-content: center;
                  align-items: center;
                  color: currentColor;
                  padding: 2px;
                }

                .time-svg {
                  display: block;
                  inline-size: 3px;
                  block-size: calc(100% - var(--bridge-gap));
                  overflow: visible;
                }

                .time-svg-main {
                  stroke-linecap: butt;
                  stroke-width: 1.25px;
                  opacity: 0.9;
                  vector-effect: non-scaling-stroke;
                }

                .time-svg-tick {
                  stroke-linecap: round;
                  stroke-width: 1px;
                  opacity: 0.88;
                  vector-effect: non-scaling-stroke;
                }

                .chip-link-vertical {
                  --rail-from: var(--accent);
                  --rail-to: var(--accent);
                  grid-column: 5;
                  position: relative;
                  z-index: 1;
                  min-width: 0;
                  min-block-size: 54px;
                  margin-block: -1px;
                  pointer-events: none;
                }

                .chip-link-vertical::before {
                  content: "";
                  position: absolute;
                  inset-block: 0;
                  inset-inline-start: var(--chip-axis-x);
                  inline-size: 1.25px;
                  margin-block: -1px;
                  border-radius: 999px;
                  background: linear-gradient(
                    180deg in oklch,
                    var(--rail-from),
                    color-mix(in oklch, var(--rail-from), var(--rail-to) 45%),
                    var(--rail-to)
                  );
                  transform: translateX(-50%);
                }

                .station-link {
                  grid-column: 5;
                  align-self: start;
                  justify-self: start;
                  z-index: 2;
                  display: inline-flex;
                  max-inline-size: 118px;
                  color: inherit;
                  text-decoration: none;
                }

                .station-link x-record-chip {
                  max-inline-size: 118px;
                }

                .station-body {
                  grid-column: 6;
                  align-self: start;
                  min-width: 0;
                  padding-block: 1px 14px;
                  padding-inline-start: 10px;
                }

                .station-body-head {
                  display: flex;
                  align-items: baseline;
                  gap: 8px;
                  min-width: 0;
                  margin-block-end: 4px;
                }

                .station-body-title {
                  overflow: hidden;
                  color: #172033;
                  font-size: 12px;
                  font-weight: 820;
                  line-height: 1.15;
                  text-overflow: ellipsis;
                  white-space: nowrap;
                }

                .station-body-meta {
                  flex: none;
                  color: var(--subtle);
                  font-size: 10px;
                  font-weight: 760;
                  line-height: 1;
                  white-space: nowrap;
                }

                .station-body-copy {
                  color: #334155;
                  font-size: 11.5px;
                  line-height: 1.48;
                }

                .station-body-copy > :first-child {
                  margin-block-start: 0;
                }

                .station-body-copy > :last-child {
                  margin-block-end: 0;
                }

                .content {
                  display: grid;
                  gap: 12px;
                  min-width: 0;
                }

                .section-card,
                .tab-panel {
                  display: grid;
                  gap: 10px;
                  border: 1px solid var(--border);
                  border-radius: 16px;
                  background: #fff;
                  padding: 12px;
                }

                .section-head {
                  display: grid;
                  grid-template-columns: auto minmax(0, 1fr) auto;
                  gap: 12px;
                  align-items: center;
                  min-width: 0;
                }

                .section-head strong {
                  font-size: 12.5px;
                }

                .section-title {
                  overflow: hidden;
                  text-overflow: ellipsis;
                  white-space: nowrap;
                }

                .section-meta {
                  color: var(--subtle);
                  font-size: 11px;
                  font-weight: 720;
                  line-height: 1;
                  white-space: nowrap;
                }

                .section-copy,
                .code,
                .yaml {
                  color: #273449;
                  font-size: 12px;
                  line-height: 1.58;
                }

                .code,
                .yaml {
                  overflow: auto;
                  border: 1px solid rgba(15, 23, 42, 0.08);
                  border-radius: 12px;
                  background: #f7f9fc;
                  padding: 10px;
                  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
                  white-space: pre-wrap;
                }

                .tabs {
                  display: grid;
                  grid-auto-flow: column;
                  grid-auto-columns: minmax(0, 1fr);
                  gap: 6px;
                }

                .tab {
                  overflow: hidden;
                  min-width: 0;
                  border: 1px solid var(--border);
                  border-radius: 999px;
                  background: #fbfcfe;
                  color: var(--subtle);
                  padding-inline: 10px;
                  cursor: pointer;
                  font-size: 11px;
                  font-weight: 760;
                  text-overflow: ellipsis;
                  white-space: nowrap;
                }

                .tab[aria-selected="true"] {
                  border-color: color-mix(in oklab, var(--accent), white 55%);
                  background: color-mix(in oklab, var(--accent), white 92%);
                  color: #1748b8;
                }

                .tab-panel[hidden] {
                  display: none;
                }

                .empty-state,
                .streaming-banner,
                .error-banner {
                  border-radius: 13px;
                  padding: 10px;
                  font-size: 12px;
                  line-height: 1.5;
                }

                .empty-state {
                  display: grid;
                  place-items: center;
                  min-height: 86px;
                  border: 1px dashed color-mix(in oklab, var(--accent), white 62%);
                  color: var(--subtle);
                  animation: breathe 2.8s ease-in-out infinite;
                }

                .streaming-banner {
                  border: 1px dashed color-mix(in oklab, var(--accent), white 62%);
                  background: linear-gradient(
                    90deg,
                    rgba(37, 99, 235, 0.04),
                    rgba(37, 99, 235, 0.12),
                    rgba(37, 99, 235, 0.04)
                  );
                  animation: shimmer 2.6s linear infinite;
                }

                .error-banner {
                  border: 1px solid color-mix(in oklab, var(--kind-error, #dc2626), white 58%);
                  background: color-mix(in oklab, var(--kind-error, #dc2626), white 94%);
                  color: #9a4312;
                }

                .mono {
                  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
                }

                .detail-tabs {
                  display: grid;
                  gap: 10px;
                  min-width: 0;
                }

                .syntax-block {
                  overflow: auto;
                  border: 1px solid color-mix(in oklab, var(--accent), white 78%);
                  border-radius: 13px;
                  background: #f8fafc;
                  color: #263447;
                  padding: 10px 0;
                  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
                  font-size: 11.5px;
                  line-height: 1.55;
                  white-space: pre;
                }

                .syntax-line {
                  display: block;
                  min-width: max-content;
                  padding-inline: 12px;
                }

                .syntax-line--meta {
                  color: color-mix(in oklch, var(--subtle), black 6%);
                }

                .syntax-line--context {
                  color: #41536b;
                }

                .syntax-line--remove {
                  background: color-mix(in oklch, var(--kind-error, #dc2626), white 94%);
                  color: color-mix(in oklch, var(--kind-error, #dc2626), black 4%);
                }

                .syntax-line--add {
                  background: color-mix(in oklch, var(--kind-text, #2563eb), white 94%);
                  color: color-mix(in oklch, var(--kind-text, #2563eb), black 12%);
                }

                .syntax-key {
                  color: color-mix(in oklch, var(--kind-config, #9333ea), black 6%);
                  font-weight: 760;
                }

                .syntax-value {
                  color: #31445d;
                }

                @keyframes shimmer {
                  0% {
                    background-position: -180px 0;
                  }
                  100% {
                    background-position: 180px 0;
                  }
                }

                @keyframes breathe {
                  0%,
                  100% {
                    opacity: 0.72;
                    transform: translateY(0);
                  }
                  50% {
                    opacity: 1;
                    transform: translateY(-1px);
                  }
                }

                @media (max-width: 780px) {
                  .detail-head {
                    grid-template-columns: 1fr;
                  }

                  .detail-grid {
                    grid-template-columns: 1fr;
                    gap: 12px;
                  }

                  .detail-track {
                    grid-template-columns:
                      max-content 4px 1px var(--rail-gap-col) minmax(min-content, max-content)
                      minmax(0, 1fr);
                  }

                  .time-bridge-label {
                    max-inline-size: 46px;
                    font-size: 8.5px;
                  }

                  .section-card,
                  .tab-panel {
                    padding: 10px;
                  }

                  .code,
                  .yaml {
                    font-size: 11.5px;
                  }

                  .syntax-block {
                    font-size: 10.8px;
                  }
                }
              </style>
              <section class="detail">
                <header class="detail-head">
                  <div class="title">
                    <strong id="title"></strong>
                    <span id="meta" class="small"></span>
                    <p id="summary" class="summary"></p>
                  </div>
                  <div id="status" class="status"></div>
                </header>
                <div id="body" class="detail-body"></div>
              </section>
            </template>
          </x-record-detail-surface>
        </section>
      </section>
    </main>

    <script>
      (() => {
        const hydrateLucide = (root = document) => {
          if (!window.lucide?.createIcons || !window.lucide.icons) return;
          window.lucide.createIcons({
            root,
            icons: window.lucide.icons,
            attrs: { width: 15, height: 15, "stroke-width": 1.8 },
          });
        };

        const escapeText = (value) =>
          String(value)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");

        const renderIcon = (name) => `<i data-lucide="${escapeText(name)}" class="icon-svg" aria-hidden="true"></i>`;

            connectedCallback() {

            static get observedAttributes() {

            }

            attributeChangedCallback() {
              this.render();
            }

            render() {
              if (!this.shadowRoot) return;
              const detail = detailData[this.getAttribute("record") ?? "model"] ?? detailData.model;
              const anchor = this.getAttribute("anchor") ?? "latest";
              this.shadowRoot.getElementById("title").textContent = detail.title;
              this.shadowRoot.getElementById("meta").textContent = `${detail.meta} · ${anchor}`;
              this.shadowRoot.getElementById("summary").textContent = detail.summary ?? "";

              this.shadowRoot.getElementById("body").innerHTML = detail.sections
                ? renderFlowTrack(detail)
                : `<div class="content">${detail.content}</div>`;
              this.bindTabs();
              hydrateLucide(this.shadowRoot);
              requestAnimationFrame(() => this.syncFlowGeometry());

            bindTabs() {
              const tabs = [...this.shadowRoot.querySelectorAll(".tab")];
              if (!tabs.length) return;
              tabs.forEach((tab) => {
                tab.addEventListener("click", () => {
                  const key = tab.dataset.tab;
                  tabs.forEach((item) => item.setAttribute("aria-selected", String(item === tab)));
                  this.shadowRoot.querySelectorAll("[data-panel]").forEach((panel) => {
                    panel.hidden = panel.dataset.panel !== key;
                  });
                });
              });
            }

            syncFlowGeometry() {
              const chipCenterY = 15;
              this.shadowRoot.querySelectorAll("[data-flow-rail]").forEach((rail, index, rails) => {
                const height = Math.max(1, Math.round(rail.getBoundingClientRect().height));
                const isFirst = index === 0;
                const isLast = index === rails.length - 1;
                const styles = getComputedStyle(rail);
                const innerX = Number.parseFloat(styles.getPropertyValue("--inner-x")) || 142;
                const outerX = Number.parseFloat(styles.getPropertyValue("--outer-x")) || Math.max(0, innerX - 6);
                const segmentStartY = isFirst ? chipCenterY : chipCenterY + 14;
                const segmentEndY = height + chipCenterY;
                const labelY = isLast
                  ? chipCenterY
                  : Math.max(segmentStartY + 18, Math.round((segmentStartY + segmentEndY) / 2));
                rail.style.setProperty("--interval-y", `${labelY}px`);
                rail.style.setProperty("--chip-center-y", `${chipCenterY}px`);
                const svg = rail.querySelector(".time-svg");
                const mainStart = rail.querySelector("[data-time-main-start]");
                const mainEnd = rail.querySelector("[data-time-main-end]");
                const tickStart = rail.querySelector("[data-time-tick-start]");
                const tickEnd = rail.querySelector("[data-time-tick-end]");
                const leader = rail.querySelector("[data-time-leader]");
                const mainY1 = segmentStartY;
                const mainY2 = segmentEndY;
                if (svg) {
                  svg.setAttribute("viewBox", `0 0 ${innerX} ${segmentEndY}`);
                  svg.style.blockSize = `${segmentEndY}px`;
                }
                [mainStart, mainEnd].forEach((line) => {
                  line?.setAttribute("x1", String(outerX));
                  line?.setAttribute("x2", String(outerX));
                });
                [tickStart, tickEnd].forEach((line) => {
                  line?.setAttribute("x1", String(outerX));
                  line?.setAttribute("x2", String(outerX + 2));
                });
                leader?.setAttribute("x1", String(outerX));
                leader?.setAttribute("x2", String(innerX));
                mainStart?.setAttribute("y1", String(mainY1));
                mainStart?.setAttribute("y2", String(Math.max(mainY1, labelY - 2)));
                mainEnd?.setAttribute("y1", String(Math.min(mainY2, labelY + 2)));
                mainEnd?.setAttribute("y2", String(mainY2));
                tickStart?.setAttribute("y1", String(mainY1));
                tickStart?.setAttribute("y2", String(mainY1));
                tickEnd?.setAttribute("y1", String(mainY2));
                tickEnd?.setAttribute("y2", String(mainY2));
                if (leader) {
                  leader.setAttribute("y1", String(labelY));
                  leader.setAttribute("y2", String(labelY));
                }
              });
            }
          },
        );

        document.querySelectorAll("[data-anchor]").forEach((button) => {
          button.addEventListener("click", () => {
            document.querySelectorAll("[data-anchor]").forEach((item) => item.setAttribute("aria-selected", "false"));
            button.setAttribute("aria-selected", "true");
            const [title, text] = anchors[button.dataset.anchor];
            document.getElementById("anchorTitle").textContent = title;
            document.getElementById("anchorText").textContent = text;
            detailSurface.setAttribute("anchor", button.dataset.anchor);
          });
        });

        hydrateLucide();
        requestAnimationFrame(() => hydrateLucide(detailSurface.shadowRoot));
      })();
    </script>
  </body>
</html>
