<!doctype html>

    <meta charset="utf-8" />

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
      :root {
        --bg: var(--tone-canvas);
        --paper: var(--tone-surface);
        --ink: var(--tone-ink);
        --muted: var(--tone-muted);
        --line: var(--tone-border);
        --blue: var(--tone-accent);
        --shadow: 0 18px 46px rgba(15, 23, 42, 0.14);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      .icon-svg {
        inline-size: 16px;
        block-size: 16px;
        flex: 0 0 auto;
      }

      .shell {
        display: grid;
        grid-template-columns: 292px minmax(0, 1fr);
        gap: 14px;
        min-height: 100%;
        padding: 14px;
      }

      .rail,
      .stage {
        border: 1px solid var(--line);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: var(--shadow);
      }

      .rail {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        gap: 14px;
        height: calc(100vh - 28px);
        padding: 14px;
      }

      .hero {
        display: grid;
        gap: 6px;
      }

      .hero h1 {
        font-size: 18px;
        line-height: 1.18;
      }

      .hero p,
      .foot,
      .nav-card span {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }

      .nav {
        display: grid;
        align-content: start;
        gap: 8px;
        overflow: auto;
      }

      .nav-card {
        display: grid;
        grid-template-columns: 30px minmax(0, 1fr);
        gap: 9px;
        min-height: 66px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: #fbfcfe;
        padding: 10px;
        color: inherit;
        text-decoration: none;
      }

      .nav-card:hover,
      .nav-card:focus {
        border-color: color-mix(in oklab, var(--blue), white 35%);
        box-shadow: 0 0 0 3px color-mix(in oklab, var(--blue), transparent 88%);
        outline: none;
      }

      .nav-icon {
        display: grid;
        place-items: center;
        width: 30px;
        height: 30px;
        border-radius: 999px;
        background: #eef2f7;
        color: var(--muted);
      }

      .nav-card strong {
        display: block;
        overflow: hidden;
        font-size: 12.5px;
        line-height: 1.2;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .stage {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-width: 0;
        height: calc(100vh - 28px);
        overflow: hidden;
      }

      .stage-bar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        border-bottom: 1px solid var(--line);
        padding: 12px 14px;
      }

      .stage-bar h2 {
        font-size: 14px;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        justify-content: flex-end;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #fbfcfe;
        padding: 4px 8px;
        color: var(--muted);
        font-size: 10.5px;
        font-weight: 720;
        white-space: nowrap;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        background: #f5f6f8;
      }

      @media (max-width: 880px) {
        .shell {
          grid-template-columns: 1fr;
        }

        .rail,
        .stage {
          height: auto;
        }

        .nav {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .stage {
          min-height: 760px;
        }
      }

      @media (max-width: 560px) {
        .shell {
          padding: 8px;
        }

        .rail {
          padding: 12px;
        }

        .nav {
          grid-template-columns: 1fr;
        }

        .stage-bar {
          grid-template-columns: 1fr;
        }

        .chips {
          justify-content: flex-start;
        }
      }
    </style>

    <script>
      const hydrateLucide = (root = document) => {
        if (!window.lucide?.createIcons || !window.lucide.icons) return;
        window.lucide.createIcons({
          root,
          icons: window.lucide.icons,
          attrs: { width: 16, height: 16, "stroke-width": 1.8 }
        });
      };

      customElements.define(
        "x-canvas-link",
        class extends HTMLElement {
          connectedCallback() {
            hydrateLucide(this.shadowRoot);
            this.shadowRoot.querySelector("a").addEventListener("click", () => {
              document.querySelectorAll("x-canvas-link").forEach((item) => item.toggleAttribute("active", item === this));
              document.getElementById("stageTitle").textContent = this.getAttribute("title");
            });
          }
        }
      );

      hydrateLucide(document);
    </script>
