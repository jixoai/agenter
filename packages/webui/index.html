<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agenter WebUI</title>
    <script>
      ;(() => {
        const lang =
          (navigator.languages && navigator.languages[0]) ||
          navigator.language ||
          navigator.userLanguage ||
          "";
        const useCnCdn = /^zh\b/i.test(lang);
        const apiHost = useCnCdn ? "https://fonts.googleapis.cn" : "https://fonts.googleapis.com";
        const staticHost = useCnCdn ? "https://fonts.gstatic.cn" : "https://fonts.gstatic.com";

        const preconnectApi = document.createElement("link");
        preconnectApi.rel = "preconnect";
        preconnectApi.href = apiHost;

        const preconnectStatic = document.createElement("link");
        preconnectStatic.rel = "preconnect";
        preconnectStatic.href = staticHost;
        preconnectStatic.crossOrigin = "anonymous";

        const stylesheet = document.createElement("link");
        stylesheet.rel = "stylesheet";
        stylesheet.href = `${apiHost}/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Share+Tech+Mono&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+JP:wght@400;500;600;700&family=Noto+Serif+KR:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Serif+TC:wght@400;500;600;700&display=swap`;

        document.head.append(preconnectApi, preconnectStatic, stylesheet);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
