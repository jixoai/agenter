syntax = "proto3";

package agenter.terminal.transport.v1;

message TerminalCursor {
  uint32 x = 1;
  uint32 y = 2;
  optional bool visible = 3;
  optional uint32 abs_y = 4;
}

message TerminalScrollback {
  uint32 viewport_offset = 1;
  uint32 total_lines = 2;
  uint32 screen_lines = 3;
}

message TerminalInteractionCapabilities {
  string ownership = 1;
  bool selection = 2;
  bool copy = 3;
  bool semantic_selection = 4;
  bool cursor_follow = 5;
  bool overlay = 6;
  optional string reason = 7;
}

message TerminalSelectionOverlayRow {
  uint32 row = 1;
  uint32 start_col = 2;
  uint32 end_col = 3;
}

message TerminalSelectionOverlay {
  string owner_id = 1;
  string ownership = 2;
  repeated TerminalSelectionOverlayRow rows = 3;
  optional string selected_text = 4;
}

message TerminalInteractionCapabilityEntry {
  string owner_id = 1;
  TerminalInteractionCapabilities capabilities = 2;
}

message TerminalInteractionFrameState {
  optional string active_owner_id = 1;
  repeated TerminalSelectionOverlay selection_overlays = 2;
  repeated TerminalInteractionCapabilityEntry capabilities = 3;
}

message TerminalRichSpan {
  string text = 1;
  optional string fg = 2;
  optional string bg = 3;
  bool bold = 4;
  bool underline = 5;
  bool inverse = 6;
}

message TerminalRichLine {
  repeated TerminalRichSpan spans = 1;
}

message TerminalFramePayload {
  uint32 seq = 1;
  optional double timestamp = 2;
  uint32 cols = 3;
  uint32 rows = 4;
  repeated string lines = 5;
  repeated TerminalRichLine rich_lines = 6;
  TerminalCursor cursor = 7;
  TerminalScrollback scrollback = 8;
  TerminalInteractionFrameState interaction = 9;
}

enum TerminalStatus {
  TERMINAL_STATUS_UNSPECIFIED = 0;
  TERMINAL_STATUS_IDLE = 1;
  TERMINAL_STATUS_BUSY = 2;
}

enum TerminalGeometryRole {
  TERMINAL_GEOMETRY_ROLE_UNSPECIFIED = 0;
  TERMINAL_GEOMETRY_ROLE_PROJECTION_ONLY = 1;
  TERMINAL_GEOMETRY_ROLE_AUTHORITY = 2;
}

message TerminalHello {
  optional string terminal_id = 1;
  TerminalGeometryRole geometry_role = 2;
  optional sint32 geometry_order = 3;
  bool debug_trace = 4;
  optional string runtime_json = 5;
  optional string direct_json = 6;
}

message TerminalResize {
  uint32 cols = 1;
  uint32 rows = 2;
}

message TerminalInputBytes {
  bytes data = 1;
}

message TerminalViewportDelta {
  sint32 delta_rows = 1;
}

message TerminalViewportTarget {
  uint32 viewport_start = 1;
}

message TerminalFollowCursor {}

message TerminalOwnerCoordinate {
  string owner_id = 1;
  uint32 row = 2;
  uint32 col = 3;
}

message TerminalSelectionRange {
  string owner_id = 1;
  uint32 start_row = 2;
  uint32 start_col = 3;
  uint32 end_row = 4;
  uint32 end_col = 5;
  bool rectangular = 6;
}

message TerminalSelectionPointAction {
  TerminalOwnerCoordinate point = 1;
}

message TerminalSelectionRangeAction {
  TerminalSelectionRange range = 1;
}

message TerminalOwnerAction {
  optional string owner_id = 1;
}

message TerminalPullFrame {
  uint32 last_applied_frame_seq = 1;
  uint32 cols = 2;
  uint32 rows = 3;
  optional uint32 max_patch_bytes = 4;
}

message TerminalClientFrame {
  oneof body {
    TerminalHello hello = 1;
    TerminalResize resize = 2;
    TerminalInputBytes input_bytes = 3;
    TerminalViewportDelta viewport_delta = 4;
    TerminalViewportTarget viewport_target = 5;
    TerminalPullFrame pull_frame = 6;
    TerminalFollowCursor follow_cursor = 7;
    TerminalSelectionPointAction selection_start = 8;
    TerminalSelectionPointAction selection_update = 9;
    TerminalSelectionPointAction selection_end = 10;
    TerminalSelectionPointAction select_word_at = 11;
    TerminalSelectionPointAction select_line_at = 12;
    TerminalSelectionRangeAction select_range = 13;
    TerminalOwnerAction copy_selection = 14;
    TerminalOwnerAction clear_selection = 15;
  }
}

message TerminalFrameFullPatch {
  TerminalFramePayload frame = 1;
}

message TerminalFrameRowPatch {
  uint32 row = 1;
  string line = 2;
  TerminalRichLine rich_line = 3;
}

message TerminalFrameRowsPatch {
  uint32 base_frame_seq = 1;
  repeated TerminalFrameRowPatch row_patches = 2;
  uint32 cols = 3;
  uint32 rows = 4;
  TerminalCursor cursor = 5;
  TerminalScrollback scrollback = 6;
  optional double timestamp = 7;
  TerminalInteractionFrameState interaction = 8;
}

message TerminalFrameScrollRowsPatch {
  uint32 base_frame_seq = 1;
  sint32 delta_rows = 2;
  repeated string inserted_lines = 3;
  repeated TerminalRichLine inserted_rich_lines = 4;
  uint32 cols = 5;
  uint32 rows = 6;
  TerminalCursor cursor = 7;
  TerminalScrollback scrollback = 8;
  optional double timestamp = 9;
  TerminalInteractionFrameState interaction = 10;
}

message TerminalFrameCachedRow {
  uint32 cid = 1;
  optional string line = 2;
  TerminalRichLine rich_line = 3;
}

message TerminalFrameRowCachePatch {
  uint32 base_frame_seq = 1;
  repeated TerminalFrameCachedRow cached_rows = 2;
  uint32 cols = 3;
  uint32 rows = 4;
  TerminalCursor cursor = 5;
  TerminalScrollback scrollback = 6;
  optional double timestamp = 7;
  TerminalInteractionFrameState interaction = 8;
}

message TerminalFrameNotModifiedPatch {
  uint32 base_frame_seq = 1;
  optional double timestamp = 2;
}

message TerminalFramePatch {
  oneof body {
    TerminalFrameFullPatch full = 1;
    TerminalFrameRowsPatch rows = 2;
    TerminalFrameScrollRowsPatch scroll_rows = 3;
    TerminalFrameRowCachePatch row_cache = 4;
    TerminalFrameNotModifiedPatch not_modified = 5;
  }
}

message TerminalFrameDirty {
  string terminal_id = 1;
  uint32 frame_seq = 2;
  string reason = 3;
  optional double timestamp = 4;
}

message TerminalFrameDelivery {
  string terminal_id = 1;
  uint32 frame_seq = 2;
  TerminalStatus status = 3;
  TerminalFramePatch patch = 4;
}

message TerminalStatusFrame {
  string terminal_id = 1;
  bool running = 2;
  TerminalStatus status = 3;
}

message TerminalErrorFrame {
  string terminal_id = 1;
  string message = 2;
}

message TerminalHelloAck {
  string terminal_id = 1;
  string attachment_id = 2;
  TerminalGeometryRole effective_geometry_role = 3;
  optional string geometry_authority_attachment_id = 4;
  optional sint32 geometry_order = 5;
  optional string authority_reason = 6;
  optional string direct_json = 7;
}

message TerminalTraceField {
  string key = 1;
  oneof value {
    string string_value = 2;
    double number_value = 3;
    bool bool_value = 4;
    bool null_value = 5;
  }
}

message TerminalTraceFrame {
  string terminal_id = 1;
  string event = 2;
  repeated TerminalTraceField fields = 3;
  optional double timestamp = 4;
}

message TerminalSelectionTextFrame {
  string terminal_id = 1;
  optional string owner_id = 2;
  string text = 3;
}

message TerminalServerFrame {
  oneof body {
    TerminalFrameDirty frame_dirty = 1;
    TerminalFrameDelivery frame = 2;
    TerminalStatusFrame status = 3;
    TerminalErrorFrame error = 4;
    TerminalHelloAck hello_ack = 5;
    TerminalTraceFrame trace = 6;
    TerminalSelectionTextFrame selection_text = 7;
  }
}
